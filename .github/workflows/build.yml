name: 打包 EXE

# 推送形如 v1.34 的 tag 时自动构建并发布 Release；
# 也可在 Actions 页面手动触发（用于临时测试构建，不会发 Release）。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 1.34）'
        required: true
        default: '1.34'

permissions:
  contents: write   # 创建 Release 需要写权限

jobs:
  build:
    # 必须用 Windows runner：项目依赖 win32print(pywin32)，
    # 且 PyInstaller 产出的是 Windows 原生 exe。
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 确定版本号
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like "refs/tags/*") {
            $v = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $v = "${{ github.event.inputs.version }}"
          }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$v" -Encoding utf8
          Write-Host "构建版本：$v"

      - name: 安装 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: 打包（不启用 UPX）
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}
        run: pyinstaller app.spec --noconfirm --clean

      - name: 上传构建产物（供手动触发时下载）
        uses: actions/upload-artifact@v4
        with:
          name: scale-v${{ steps.ver.outputs.version }}
          path: dist/*.exe
          if-no-files-found: error

      - name: 发布到 Release（仅 tag 触发）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
